<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technowiz</title>
    <style>
        body{
            background: url(a.jpg);
            background-size: cover;
            color: white;
            font-family: sans-serif;
            font-size: 20px;
        }
        h3{
            text-align: center;
        }
        #form-els{
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            margin-top: 70px;
            background: linear-gradient(rgba(206, 28, 150, 0.4),rgba(35, 17, 223, 0.407));
            padding: 70px;
            padding-bottom: 20px;
            padding-top: 20px;
            border-radius: 150px;
        }
        input[type=text]{
            width: 350px;
            margin-bottom: 20px;
            /* background-color: blue; */
            background: linear-gradient(grey,#4f2ec3);
            opacity: .8;
            border-radius: 5px;
            box-shadow: 10px 10px 8px black;
            border: 1px solid;
            color: white;
        }
        ::placeholder{
            color: white;
        }
        #submit{
            background-color: #6d8db4;
            border-radius: 5px;
            box-shadow: 0 0 8px yellow;
        }
        .n{
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="form-els">
        <h3>Registration</h3>
        <label class="n">Your First Name</label><br><input type="text" placeholder="Your first name" name="" id=""><br>
        <label class="n">Your Last Name</label><br><input type="text" placeholder="Your last name" name="" id=""><br>
        <label class="n">Your Email</label><br><input type="text" placeholder="Your email id " name="" id=""><br>
        <label class="n">Your Age</label><br><input type="text" placeholder="Your age" name="" id=""><br>
        <label class="n" for="">Gender</label><br>
        <input type="radio" name="g" id="">Male
        <input type="radio" name="g" id="">Female
        <input type="radio" name="g" id="">Other <br><br><br><br><br>
        <center><input id="submit" type="submit" value="submit"></center>
    </div>
</body>
</html>
